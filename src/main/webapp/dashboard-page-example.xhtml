<?xml version="1.0" encoding="UTF-8"?>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                template="/WEB-INF/templates/prime-dashboard-layout.xhtml">

    <ui:define name="title">Dashboard</ui:define>
    <ui:define name="pageTitle">Dashboard</ui:define>

    <ui:define name="content">
        <p:panel styleClass="mb-4">
        </p:panel>

        <h2 class="text-xl font-semibold">Section title</h2>

        <p:dataTable value="#{dashboardController.rows}"
                     var="row"
                     stripedRows="true"
                     size="small"
                     reflow="true"
                     styleClass="mt-2">
            <p:column headerText="#"><span>#{row.id}</span></p:column>
            <p:column headerText="Header"><span>#{row.col1}</span></p:column>
            <p:column headerText="Header"><span>#{row.col2}</span></p:column>
            <p:column headerText="Header"><span>#{row.col3}</span></p:column>
            <p:column headerText="Header"><span>#{row.col4}</span></p:column>
        </p:dataTable>
    </ui:define>
</ui:composition>
