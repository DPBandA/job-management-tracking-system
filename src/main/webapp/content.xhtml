<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:p="http://primefaces.org/ui"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"   
    xmlns:pt="http://xmlns.jcp.org/jsf/passthrough"
    xmlns:c="http://xmlns.jcp.org/jsp/jstl/core">

    <h:form id="headerForm" 
            rendered="#{jobManager.userLoggedIn}"> 

        <p:growl id="growl3" life="5000" showDetail="true"/>
        <p:growl id="notificationBadge" life="5000" showDetail="true"/>

        <header class="navbar2 flex-md-nowrap p-0 shadow" >
            <p:panel>
                <h:outputLink value="#{jobManager.organizationWebsite}">
                    <h:graphicImage
                        library="images"
                        value="#{jobManager.logoURL}"
                        width="40"
                        height="32"
                        styleClass="me-2" />                      
                </h:outputLink>

                <span class="d-none d-md-inline">
                    <h:outputLink value="#{jobManager.organizationWebsite}">
                        <p:outputLabel 
                            styleClass="text-xl font-semibold" 
                            value="#{jobManager.applicationHeader}"/>
                    </h:outputLink>
                </span>
            </p:panel>

            <h:panelGroup style="float: right;" >

                <h:panelGroup style="margin-right: 10px;">
                    <p:commandButton actionListener="#{systemManager.editUserProfile}"                                            
                                     icon="pi pi-user"
                                     title="Profile"
                                     style="margin-right: 10px;"
                                     styleClass="rounded-button ui-button-outlined"
                                     process="@this">  
                        <p:ajax event="dialogReturn"
                                oncomplete="window.location.reload();" />

                    </p:commandButton> 

                    <p:commandButton actionListener="#{jobManager.logout}"                                             
                                     icon="pi pi-sign-out"
                                     styleClass="rounded-button ui-button-outlined"
                                     title="Logout"
                                     oncomplete="location.reload();"
                                     process="@this"/>  
                </h:panelGroup>

                <p:menuButton icon="pi pi-bars" 
                              buttonStyleClass="rounded-button ui-button-outlined" >
                    <p:menuitem value="Profile" 
                                action="#{systemManager.editUserProfile}" 
                                icon="pi pi-user" />
                    <p:menuitem 
                        value="Website" 
                        url="#{jobManager.organizationWebsite}" 
                        icon="pi pi-external-link"/>
                    <p:divider/>
                    <p:menuitem value="Logout" 
                                action="#{jobManager.logout}" 
                                oncomplete="location.reload();"
                                icon="pi pi-sign-out"/>                   
                </p:menuButton>

            </h:panelGroup>          

        </header>

        <span class="d-none d-md-inline">
            <ui:include src="menubar.xhtml"/>
        </span>
        
    </h:form>

    <div class="container-fluid">
        <div class="row">
            <div
                class="sidebar border border-right col-md-4 col-lg-3 p-0 bg-body-tertiary" >
                <div
                    class="offcanvas-md offcanvas-end bg-body-tertiary"
                    tabindex="-1"
                    id="sidebarMenu"
                    aria-labelledby="sidebarMenuLabel" >
                    <div class="offcanvas-header">
                        <h5 class="offcanvas-title" id="sidebarMenuLabel">
                            <h:graphicImage
                                library="images"
                                value="#{jobManager.logoURL}"
                                width="40"
                                height="32"
                                styleClass="me-2" />         
                        </h5>
                        <button
                            type="button"
                            class="btn-close"
                            data-bs-dismiss="offcanvas"
                            data-bs-target="#sidebarMenu"
                            aria-label="Close">
                        </button>
                    </div>
                    <div class="offcanvas-body d-md-flex flex-column p-0 pt-lg-3 overflow-y-auto" >
                        <ui:include src="dashboard.xhtml"/>
                    </div>
                </div>
            </div>
            <main class="col-md-8 ms-sm-auto col-lg-9 px-md-4">
                <span class="d-none d-md-inline">
                    <ui:include src="mainTabView.xhtml"/>
                </span>

                <span class="d-inline d-md-none">
                    <ui:include src="accordionTabView.xhtml"/>
                </span>
            </main>
        </div>
        <footer>           
            <ui:include src="footer.xhtml"/>
        </footer>
    </div>

    <script
        src="js/bootstrap.bundle.min.js"
        class="astro-vvvwv3sm">
    </script>
</html>
